<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>For Hồng Thứ 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
}

/* nền video */
#bgVideo {
  position: fixed;
  right: 0;
  bottom: 0;
  min-width: 100%;
  min-height: 100%;
  z-index: -1;
}

/* layout */
.container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 100vh;
  padding: 20px;
  color: white;
}

/* ảnh */
.side {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.side img {
  width: 160px;
  height: 200px;
  object-fit: cover;
  border-radius: 15px;
  border: 3px solid white;
}

/* giữa */
.center {
  text-align: center;
  max-width: 400px;
}

h1 {
  margin-bottom: 10px;
}

#text {
  font-size: 18px;
  min-height: 120px;
}

/* bóng bay */
.balloon {
  position: absolute;
  font-size: 25px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); opacity: 0; }
}

/* tim */
.heart {
  position: absolute;
  animation: floatUp 5s linear infinite;
}
</style>
</head>

<body>

<!-- nền video -->
<video autoplay muted loop id="bgVideo">
  <source src="https://cdn.coverr.co/videos/coverr-floating-bokeh-1572/1080p.mp4" type="video/mp4">
</video>

<div class="container">

  <!-- bên trái -->
  <div class="side">
    <img src="LINK1">
    <img src="LINK2">
  </div>

  <!-- giữa -->
  <div class="center">
    <h1>Happy Birthday Hồng Thứ 🎂</h1>
    <div id="text"></div>
  </div>

  <!-- bên phải -->
  <div class="side">
    <img src="LINK3">
    <img src="LINK4">
  </div>

</div>

<script>

// lời chúc
const message = [
  "Chúc bạn một ngày thật vui vẻ 💖",
  "Mong là hôm nay sẽ có thật nhiều điều dễ thương",
  "",
  "Không cần gì quá lớn lao",
  "chỉ cần bạn luôn vui là được 😌"
];

let i = 0, j = 0;

function typeEffect() {
  if (i < message.length) {
    if (j < message[i].length) {
      document.getElementById("text").innerHTML += message[i][j];
      j++;
      setTimeout(typeEffect, 40);
    } else {
      document.getElementById("text").innerHTML += "<br>";
      i++;
      j = 0;
      setTimeout(typeEffect, 300);
    }
  }
}

typeEffect();

// bóng bay 🎈
setInterval(() => {
  let b = document.createElement("div");
  b.innerHTML = "🎈";
  b.className = "balloon";
  b.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 6000);
}, 700);

// tim 💖
setInterval(() => {
  let h = document.createElement("div");
  h.innerHTML = "💗";
  h.className = "heart";
  h.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 5000);
}, 400);

</script>

</body>
</html>
