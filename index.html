<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 💖</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to right, #ff9a9e, #fad0c4);
  text-align: center;
  color: white;
}
.container {
  margin-top: 100px;
}
h1 {
  font-size: 40px;
}
p {
  font-size: 20px;
}
button {
  padding: 10px 20px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: white;
  color: #ff4b5c;
  cursor: pointer;
}
</style>
</head>
<body>

<div class="container">
  <h1>🎂 Happy Birthday!</h1>
  <p>Chúc bạn một ngày thật đặc biệt 💖</p>
  <button onclick="showMessage()">Bấm vào đây nè 😉</button>
</div>

<script>
function showMessage() {
  alert("Thật ra người làm trang này… thích bạn đó 😳");
}
</script>

</body>
</html>
