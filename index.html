<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
  overflow: hidden;
}

/* màn hình */
.screen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  transition: 0.5s;
}

/* nút */
button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: white;
  color: black;
  cursor: pointer;
}

/* màn chính */
#main {
  display: none;
  background: linear-gradient(to right, #ff9a9e, #fad0c4);
}

/* ảnh */
img {
  width: 170px;
  height: 170px;
  border-radius: 50%;
  border: 4px solid white;
  margin-bottom: 15px;
  object-fit: cover;
  opacity: 0;
  transition: 1s;
}

/* text */
#text {
  font-size: 18px;
  min-height: 120px;
  padding: 0 20px;
  opacity: 0;
  transition: 1s;
}

/* trái tim */
.heart {
  position: absolute;
  animation: float 5s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- MÀN 1 -->
<div class="screen" id="start">
  <h2>Hình như có gì đó dành cho bạn 🎁</h2>
  <button onclick="next1()">Xem thử không? 😏</button>
</div>

<!-- MÀN 2 -->
<div class="screen" id="middle" style="display:none;">
  <h2>Chuẩn bị tinh thần chưa…</h2>
  <button onclick="openGift()">Rồi 😌</button>
</div>

<!-- MÀN CHÍNH -->
<div class="screen" id="main">

  <!-- 🔥 ẢNH (để trống, bạn thêm sau) -->
  <img id="avatar" src="">

  <h1>Happy Birthday 🎂</h1>

  <div id="text"></div>

</div>

<!-- 🎶 NHẠC (bạn thay sau) -->
<audio id="music" loop></audio>

<script>

// chuyển màn
function next1() {
  document.getElementById("start").style.display = "none";
  document.getElementById("middle").style.display = "flex";
}

function openGift() {
  document.getElementById("middle").style.display = "none";
  document.getElementById("main").style.display = "flex";

  document.getElementById("music").play();

  // hiện ảnh
  let img = document.getElementById("avatar");
  img.style.opacity = 1;

  // delay rồi hiện chữ
  setTimeout(() => {
    document.getElementById("text").style.opacity = 1;
    typeEffect();
  }, 800);
}

// nội dung chữ (bạn có thể sửa sau)
const message = [
  "Chúc bạn một ngày thật vui vẻ 💖",
  "Mong là hôm nay sẽ có nhiều điều dễ thương xảy ra",
  "",
  "Thật ra ban đầu chỉ định làm đơn giản thôi",
  "nhưng nghĩ lại…",
  "",
  "có những người",
  "dù không nói nhiều",
  "nhưng lại khiến người khác nhớ khá lâu 😌"
];

let i = 0, j = 0;

function typeEffect() {
  if (i < message.length) {
    if (j < message[i].length) {
      document.getElementById("text").innerHTML += message[i][j];
      j++;
      setTimeout(typeEffect, 40);
    } else {
      document.getElementById("text").innerHTML += "<br>";
      i++;
      j = 0;
      setTimeout(typeEffect, 300);
    }
  }
}

// trái tim nhẹ
setInterval(() => {
  let heart = document.createElement("div");
  heart.innerHTML = "💗";
  heart.className = "heart";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (14 + Math.random() * 18) + "px";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 5000);
}, 500);

</script>

</body>
</html>
