<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>For Hồng Thứ 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
  overflow: hidden;
}

.screen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

button {
  padding: 12px 25px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #ff4b5c;
  color: white;
  cursor: pointer;
}

#main {
  display: none;
  background: linear-gradient(to right, #ff9a9e, #fad0c4);
}

img {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  margin-bottom: 15px;
  border: 4px solid white;
  object-fit: cover;
}

#text {
  font-size: 18px;
  min-height: 100px;
  padding: 0 20px;
}

/* trái tim */
.heart {
  position: absolute;
  animation: float 5s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- MÀN ĐẦU -->
<div class="screen" id="start">
  <h2>🎁 Có một điều dành cho bạn</h2>
  <button onclick="openGift()">Mở ra xem thử 😏</button>
</div>

<!-- MÀN CHÍNH -->
<div class="screen" id="main">

  <!-- 🔥 THAY LINK ẢNH Ở ĐÂY -->
  <img src="LINK_ANH_GITHUB">

  <h1>Happy Birthday Hồng Thứ 🎂</h1>

  <div id="text"></div>

</div>

<!-- 🎶 NHẠC WENDY -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/L1rR_smhD78?autoplay=1&loop=1&playlist=L1rR_smhD78"
frameborder="0" allow="autoplay"></iframe>

<script>
function openGift() {
  document.getElementById("start").style.display = "none";
  document.getElementById("main").style.display = "flex";
  typeEffect();
}

const message = [
  "Chúc bạn một ngày thật vui vẻ 💖",
  "Mong là hôm nay sẽ có thật nhiều điều dễ thương xảy ra",
  "",
  "Cảm ơn vì đã xuất hiện trong cuộc sống này",
  "dù chỉ là một phần nhỏ thôi 😌"
];

let i = 0, j = 0;

function typeEffect() {
  if (i < message.length) {
    if (j < message[i].length) {
      document.getElementById("text").innerHTML += message[i][j];
      j++;
      setTimeout(typeEffect, 40);
    } else {
      document.getElementById("text").innerHTML += "<br>";
      i++;
      j = 0;
      setTimeout(typeEffect, 300);
    }
  }
}

// trái tim bay
setInterval(() => {
  let heart = document.createElement("div");
  heart.innerHTML = "💗";
  heart.className = "heart";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (15 + Math.random() * 20) + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}, 400);
</script>

</body>
</html>
